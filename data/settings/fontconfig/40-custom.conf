<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Update command: fc-cache -f -v -->
  <match target="font">
    <!-- Many older or highly specific vector fonts contain pre-rendered,
         pixelated versions of themselves designed for specific small font sizes.
         Disabling this setting forces the rendering engine to ignore those bitmaps and
         always render the smooth vector outlines, regardless of the size. -->
    <edit name="embeddedbitmap" mode="assign">
      <bool>false</bool>
    </edit>

    <!-- This setting smooths the jagged, stair-step edges of vector fonts. The
         rendering engine achieves this by using varying shades of gray (or color) along
         the edges of the letters to create the optical illusion of a smooth curve on a
         grid of square pixels. -->
    <edit mode="assign" name="antialias">
      <bool>true</bool>
    </edit>

    <!-- Disabling autohinting forces the rendering engine to use the superior
         native hinting instructions built into modern scalable fonts. -->
    <edit mode="assign" name="autohint">
      <bool>false</bool>
    </edit>

    <!-- Hinting is the process of mathematically snapping the outlines of a
         font to the physical pixel grid of your monitor. Enabling this is required to
         make text appear crisp and sharp on standard resolution displays like the one on
         your ThinkPad T420s. -->
    <edit mode="assign" name="hinting">
      <bool>true</bool>
    </edit>

    <!-- Setting the style to slight tells the rendering engine to only align
         the font to the vertical pixel grid, rather than both vertical and horizontal.
         This provides an excellent balance by keeping the text sharp on the baseline
         while preserving the original artistic shape and spacing of the typeface. -->
    <edit mode="assign" name="hintstyle">
      <const>hintslight</const>
    </edit>

    <!-- When you use subpixel rendering (configured below), it can introduce
         harsh color fringing on the edges of your text. The default LCD filter applies a
         slight mathematical blur to the individual color channels to eliminate these
         artifacts, making the text look solid black. -->
    <edit mode="assign" name="lcdfilter">
      <const>lcddefault</const>
    </edit>

    <!-- A single white pixel on an LCD screen is constructed from three
         vertical subpixels: red, green, and blue. This setting tells the renderer to
         treat those subpixels as individual light sources. By utilizing the specific
         physical RGB layout of your hardware, the system effectively triples the
         horizontal resolution for text rendering. -->
    <edit mode="assign" name="rgba">
      <const>rgb</const>
    </edit>
  </match>

  <!-- This block instructs the system to completely ignore old, non-scalable
       bitmap fonts (such as legacy X11 fonts). This guarantees that your system will
       only load and attempt to render modern, scalable vector fonts. -->
  <selectfont>
    <rejectfont>
      <pattern>
        <patelt name="scalable">
          <bool>false</bool>
        </patelt>
      </pattern>
    </rejectfont>
  </selectfont>
</fontconfig>
